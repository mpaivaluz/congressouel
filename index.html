<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9º COL - Congresso Odontológico Londrinense</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Usamos o azul exato do fundo da sua logo */
            --azul-escuro: #0a182f; 
            --azul-claro: #112240;
            --dourado: #c5a059; /* Dourado da logo */
            --dourado-brilho: #e2c285;
            --branco: #e6f1ff;
        }

        /* --- CONFIGURAÇÃO GLOBAL DO FUNDO (CORRIGIDO PARA MOBILE) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* Cor de fundo sólida para toda a página */
            background-color: var(--azul-escuro); 
            color: var(--branco);
            line-height: 1.6;
            
            /* Usamos 'position: relative' para que o pseudo-elemento ':before' funcione */
            position: relative;
        }

        /* Criamos uma camada separada apenas para a imagem de fundo */
        body:before {
            content: "";
            position: fixed; /* Fica parada na tela */
            top: 0; left: 0;
            width: 100%; height: 100%;
            
            /* --- CONFIGURAÇÃO DA IMAGEM DE FUNDO (MARCA D'ÁGUA) --- */
            /* Certifique-se de salvar a imagem como 'fundo-logo.png' na mesma pasta */
            background-image: url('fundo-logo.png'); 
            background-position: center; /* Centralizada */
            background-repeat: no-repeat;
            background-size: 70%; /* Tamanho inicial (no desktop) */
            
            /* --- TRUQUE PARA TENTAR USAR A IMAGEM COMO MARCA D'ÁGUA --- */
            /* Esta regra tenta manter o desenho dourado e esconder o fundo azul da imagem.
               Pode não funcionar perfeitamente dependendo da imagem.
               O ideal seria um .png transparente. */
            mask-image: radial-gradient(black, transparent 100%);
            -webkit-mask-image: radial-gradient(black, transparent 100%);
            mask-composite: exclude;
            
            /* Controla a transparência da marca d'água (0.0 a 1.0) */
            opacity: 0.15; 
            z-index: -1; /* Fica atrás de todo o conteúdo */
        }
        /* Fonte para títulos (mais elegante/clássica) */
        .fonte-titulo {
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        /* Fonte para textos de destaque (mais moderna/limpa) */
        .fonte-destaque {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }
        /* Camada opcional para dar um efeito de blur no fundo se precisar */
        .fundo-opaco {
            display: none; /* Desativado, pois usamos o :before acima */
        }

        /* Header */
        header {
            background-color: rgba(10, 25, 47, 0.98);
            padding: 1rem 5%;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dourado);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .logo { 
            font-size: 1.5rem; 
            color: var(--dourado); 
font-family: 'Pinyon Script', cursive;
            font-weight: 400;
            text-transform: none; }

        nav a {
            color: var(--branco);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        nav a:hover { color: var(--dourado); }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 60px;
        }

        .hero h1 { font-size: 3.5rem; color: var(--dourado); margin-bottom: 10px; text-transform: uppercase; }
        .hero p { font-size: 1.3rem; max-width: 600px; color: var(--branco); font-weight: 300; }

        .btn-inscricao {
            background: linear-gradient(45deg, var(--dourado), var(--dourado-brilho));
            color: var(--azul-escuro);
            padding: 15px 45px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            margin-top: 40px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4);
            text-transform: uppercase;
        }

        .btn-inscricao:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Sections */
        section { padding: 100px 10%; position: relative; z-index: 1; }
        h2 { color: var(--dourado); border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 15px; text-transform: uppercase; font-size: 2rem; }

        /* Info Cards */
        .info-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: rgba(17, 34, 64, 0.9);
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid var(--dourado);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); background: rgba(17, 34, 64, 1); }

        .card i { font-size: 2rem; color: var(--dourado); margin-bottom: 15px; }
        .card h3 { margin-top: 0; color: var(--branco); }

        /* Tabela de Preços */
        .table-wrapper { overflow-x: auto; margin-top: 40px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(17, 34, 64, 0.95);
            border-radius: 8px;
        }

        th, td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }

        th { color: var(--dourado); text-transform: uppercase; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }

        footer {
            text-align: center;
            padding: 50px 10%;
            background: #020c1b;
            font-size: 0.8rem;
            color: #8892b0;
            position: relative; z-index: 1;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .hero p { font-size: 1rem; }
            nav { display: none; }
            section { padding: 80px 5%; }
            
            /* No celular, aumentamos o tamanho da marca d'água para ocupar mais tela */
            body:before { background-size: 150%; opacity: 0.1; } 
        }
    </style>
</head>
