<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9º COL - Congresso Odontológico Londrinense</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-escuro: #0a182f; 
            --dourado: #c5a059;
            --branco: #e6f1ff;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--azul-escuro);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--branco);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* AJUSTE DA FOTO DE FUNDO */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fundo-logo.png'); /* O NOME DO ARQUIVO DEVE SER ESTE */
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15; /* Aumentei um pouco para você ver se voltou */
            z-index: 0; /* Camada base */
            pointer-events: none;
        }

        .hero, footer {
            position: relative;
            z-index: 1; /* Garante que o texto fique na frente da foto */
        }

        /* --- ESTILO PARA COMPUTADOR (DESKTOP) --- */
        @media (min-width: 769px) {
            .background-overlay { background-size: 45%; }
            
            .hero h1 { 
                font-family: 'Pinyon Script', cursive;
                font-size: 5.5rem; 
                color: var(--dourado);
                margin: 0;
            }
            .hero h2 {
                font-family: 'Anton', sans-serif;
                font-size: 3.5rem;
                margin-top: -35px;
                letter-spacing: 5px;
                text-transform: uppercase;
            }
            .caixa-breve {
                font-size: 2.5rem;
                padding: 10px 40px;
                margin-top: 30px;
                font-family: 'Pinyon Script', cursive;
            }
        }

        /* --- ESTILO PARA CELULAR (MOBILE) --- */
        @media (max-width: 768px) {
            .background-overlay { background-size: 85%; }

            .hero h1 { 
                font-family: 'Pinyon Script', cursive;
                font-weight: 700;
                font-size: 1.6rem; 
                color: var(--dourado);
                text-transform: uppercase;
                margin-bottom: 10px;
                padding: 0 10px;
            }
            .hero h2 { display: none;
            font-family: 'Anton', sans-serif; } 

            .caixa-breve {
                font-family: 'Pinyon Script', cursive;
                font-size: 2.2rem;
                padding: 5px 25px;
            }

            footer { padding: 15px; }
            .footer-text { font-size: 0.65rem !important; color: #8892b0; }
            .dev-info { font-size: 0.65rem !important; color: #8892b0;}
        }

        /* Estilos Comuns */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .caixa-breve {
            background: rgba(197, 160, 89, 0.12);
            border: 1px solid var(--dourado);
            border-radius: 4px;
            color: var(--dourado);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.1);
        }

        footer {
            text-align: center;
            background: rgba(2, 12, 27, 0.95);
            border-top: 1px solid rgba(197, 160, 89, 0.2);
        }

        .social-links { margin-bottom: 5px; }
        .social-links a { color: var(--dourado); text-decoration: none; font-size: 1.6rem; }
        
.footer-text { 
    margin: 0; 
    font-weight: 700; 
    font-size: 0.8rem;
    color: #8892b0; /* Altere aqui para o PC */
}
        .dev-info { margin: 10px 0 0 5; color: #8892b0; 
        font-size: 0.8rem; /* Altere aqui para o PC */}
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="hero">
        <h1>9º Congresso Odontológico</h1>
        <h2>Londrinense</h2>
        <div class="caixa-breve">Em Breve...</div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.instagram.com/9coluel" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
        
        <p class="footer-text">9º COL - Congresso Odontológico Londrinense</p>
        <p class="dev-info">Clínica Odontológica Universitária - Universidade Estadual de Londrina (UEL)</p>
        
        <p class="dev-info">
            © 2026. Todos os direitos reservados. | Desenvolvido por Miguel Luz
        </p>
    </footer>

</body>
</html>
